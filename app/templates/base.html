<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Prompt Evolve{% endblock %}</title>
  <style>
    :root {
      --bg: #f8f9fa;
      --card-bg: #ffffff;
      --border: #dee2e6;
      --primary: #0d6efd;
      --primary-hover: #0b5ed7;
      --text: #212529;
      --muted: #6c757d;
      --success: #198754;
      --danger: #dc3545;
      --warning: #ffc107;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
    a { color: var(--primary); text-decoration: none; }
    a:hover { text-decoration: underline; color: var(--primary-hover); }

    /* Nav */
    nav { background: var(--text); color: #fff; padding: .75rem 1.5rem; display: flex; align-items: center; gap: 2rem; }
    nav .brand { font-weight: 700; font-size: 1.1rem; color: #fff; }
    nav .links a { color: #ced4da; font-size: .9rem; }
    nav .links a:hover { color: #fff; text-decoration: none; }
    nav .links { display: flex; gap: 1.25rem; }

    /* Layout */
    .container { max-width: 1100px; margin: 1.5rem auto; padding: 0 1rem; }
    h1 { font-size: 1.5rem; margin-bottom: 1rem; }
    h2 { font-size: 1.25rem; margin-bottom: .75rem; }

    /* Cards */
    .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; margin-bottom: 1rem; }
    .card h2 { margin-top: 0; }

    /* Stats row */
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .stat-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; text-align: center; }
    .stat-card .number { font-size: 2rem; font-weight: 700; color: var(--primary); }
    .stat-card .label { font-size: .85rem; color: var(--muted); }

    /* Tables */
    table { width: 100%; border-collapse: collapse; font-size: .9rem; }
    th, td { padding: .6rem .75rem; text-align: left; border-bottom: 1px solid var(--border); }
    th { background: var(--bg); font-weight: 600; font-size: .8rem; text-transform: uppercase; color: var(--muted); }
    tr:hover td { background: #f1f3f5; }

    /* Badges */
    .badge { display: inline-block; padding: .15rem .5rem; border-radius: 4px; font-size: .75rem; font-weight: 600; }
    .badge-primary { background: #e7f1ff; color: var(--primary); }
    .badge-success { background: #d1e7dd; color: var(--success); }
    .badge-danger { background: #f8d7da; color: var(--danger); }
    .badge-warning { background: #fff3cd; color: #664d03; }
    .badge-muted { background: #e9ecef; color: var(--muted); }

    /* Prompt display */
    .prompt-text { background: #f8f9fa; border: 1px solid var(--border); border-radius: 6px; padding: 1rem; font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; font-size: .85rem; white-space: pre-wrap; word-break: break-word; max-height: 300px; overflow-y: auto; }

    /* Utility */
    .text-muted { color: var(--muted); }
    .text-success { color: var(--success); }
    .text-danger { color: var(--danger); }
    .mt-1 { margin-top: .5rem; }
    .mb-1 { margin-bottom: .5rem; }
    .truncate { max-width: 250px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* Score bar */
    .score-bar { display: inline-block; width: 60px; height: 8px; background: #e9ecef; border-radius: 4px; overflow: hidden; vertical-align: middle; margin-right: .25rem; }
    .score-bar .fill { height: 100%; border-radius: 4px; }

    /* Empty state */
    .empty-state { text-align: center; padding: 3rem 1rem; color: var(--muted); }
    .empty-state p { font-size: 1rem; margin-bottom: .5rem; }
    .empty-state code { background: #e9ecef; padding: .15rem .4rem; border-radius: 3px; font-size: .85rem; }
  </style>
</head>
<body>
  <nav>
    <span class="brand">🧬 Prompt Evolve</span>
    <div class="links">
      <a href="/">Dashboard</a>
      <a href="/candidates">Candidates</a>
      <a href="/runs">Runs</a>
      <a href="/eval-cases">Eval Cases</a>
      <a href="/rounds">Rounds</a>
    </div>
  </nav>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
